<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple BMI calculator to check your body mass index.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,200;8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Roboto Flex", sans-serif;
            outline: none;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(30deg, darkblue, rgb(60, 192, 159));
        }
        .wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 800px;
            width: 650px;
            border: 3px solid rgba(255,225,255,0.8);
            background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iI0ZFOUVDNyIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cGF0aCBkPSJNMTIgMkM2LjQ4IDIgMiA2LjQ4IDIgMTJzNC40OCAxMCAxMCAxMCAxMC00LjQ4IDEwLTEwUzE3LjUyIDIgMTIgMnptMCAxOGMtNC40MSAwLTgtMy41OS04LThzMy41OS04IDgtOCA4IDMuNTkgOCA4LTMuNTkgOC04IDh6Ii8+Cjwvc3ZnPgo=");
            background-size: 24px 24px;
            background-position: center;
            border-radius: 30px;
            color: rgb(135, 223, 235);
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: auto;
            padding: 40px;
            background: rgba(0, 0, 0, 0.05);
            box-shadow: 0 5px 30px rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 200, 255, 0.9);
            transition: all 0.3s ease;
        }
        .container:hover {
            box-shadow: none;
            border-color: white;
            cursor: crosshair;
        }
        h1 {
            font-weight: 700;
            font-size: 36px;
            text-align: center;
            margin-bottom: 10px;
        }
        p.intro {
            font-weight: 200;
            font-size: 20px;
            text-align: center;
            margin: 10px 0 30px;
            color: #fff;
        }
        .data {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        label {
            font-size: 1.2rem;
            text-align: center;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 120px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.233);
            text-align: center;
            border: 1px solid #fff;
            font-size: 1.25rem;
            font-weight: 500;
            color: #fff;
            border-radius: 5px;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        select {
            width: 120px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.233);
            border: 1px solid #fff;
            color: #fff;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn {
            height: 50px;
            width: 120px;
            font-size: 1rem;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .res {
            margin: 20px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.233);
            border-radius: 10px;
            text-align: center;
            min-height: 100px;
            transition: background 0.3s;
        }
        .res p {
            font-size: 20px;
            color: #fff;
            margin: 10px 0;
        }
        .res.underweight { background-color: rgba(255, 215, 0, 0.4); } /* Gold for underweight */
        .res.normal { background-color: rgba(0, 128, 0, 0.4); } /* Green for normal */
        .res.overweight { background-color: rgba(255, 165, 0, 0.4); } /* Orange for overweight */
        .res.obese { background-color: rgba(255, 0, 0, 0.4); } /* Red for obese */
        .error { color: #ffcc00; font-weight: bold; }
        .init {
            display: block;
            margin: 20px auto 0;
            width: 120px;
            height: 40px;
            color: #fff;
            background: transparent;
            border: 1px solid #fff;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .init:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        @media screen and (max-width: 600px) {
            .wrapper {
                height: auto;
                width: 100%;
                padding: 20px;
            }
            .container {
                padding: 20px;
            }
            .data {
                flex-direction: column;
                align-items: center;
            }
            input, select, .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
    <title>BMI Calculator</title>
</head>
<body onload="initiate()">
    <div class="wrapper">
        <main class="container">
            <h1>Body Mass Index Calculator</h1>
            <p class="intro">Enter your weight and height to calculate your BMI.</p>
    
            <div class="data">
                <div>
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" min="30" placeholder="e.g., 70" aria-label="Weight">
                </div>
                <div>
                    <label for="height">Height</label>
                    <input type="number" id="height" min="1" step="0.01" placeholder="e.g., 1.75" aria-label="Height">
                </div>
                <div>
                    <label for="units">Units</label>
                    <select id="units" aria-label="Unit system">
                        <option value="metric">Metric (kg/m)</option>
                        <option value="imperial">Imperial (lbs/in)</option>
                    </select>
                </div>
                <button class="btn" id="calculateBtn">Calculate BMI</button>
            </div>
            <div class="res" id="res"></div>
            <button class="init" id="resetBtn">Reset</button>
        </main>
    </div>
    <script>
        function initiate() {
            document.getElementById('weight').focus();
        }

        function calculate() {
            const weightInput = document.getElementById('weight');
            const heightInput = document.getElementById('height');
            const units = document.getElementById('units').value;
            const res = document.getElementById('res');

            let weight = parseFloat(weightInput.value);
            let height = parseFloat(heightInput.value);

            // Validation
            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                res.innerHTML = '<p class="error">Please enter valid positive numbers for weight and height.</p>';
                res.className = 'res'; // Reset class
                return;
            }

            // Convert to metric if imperial
            if (units === 'imperial') {
                weight *= 0.453592; // lbs to kg
                height *= 0.0254; // inches to meters
            }

            const bmi = weight / (height ** 2);
            let category = '';
            let message = '';
            let className = 'res';

            if (bmi < 18.5) {
                category = 'Underweight';
                message = 'Your BMI is below the normal range. Consider consulting a healthcare professional.';
                className += ' underweight';
            } else if (bmi < 25) {
                category = 'Normal';
                message = 'Your BMI is in the normal range. Keep up the good work!';
                className += ' normal';
            } else if (bmi < 30) {
                category = 'Overweight';
                message = 'Your BMI is above the normal range. Increasing activity might help.';
                className += ' overweight';
            } else if (bmi < 35) {
                category = 'Obese (Class 1)';
                message = 'Your BMI indicates obesity. Consider lifestyle changes or professional advice.';
                className += ' obese';
            } else if (bmi < 40) {
                category = 'Obese (Class 2)';
                message = 'Your BMI indicates moderate obesity. Seek medical guidance.';
                className += ' obese';
            } else {
                category = 'Obese (Class 3)';
                message = 'Your BMI indicates severe obesity. Professional help is recommended.';
                className += ' obese';
            }

            res.innerHTML = `
                <p>Your BMI is <b>${bmi.toFixed(2)}</b></p>
                <p><b>Category:</b> ${category}</p>
                <p>${message}</p>
            `;
            res.className = className;
        }

        function reset() {
            document.getElementById('weight').value = '';
            document.getElementById('height').value = '';
            document.getElementById('units').value = 'metric';
            document.getElementById('res').innerHTML = '';
            document.getElementById('res').className = 'res';
            initiate();
        }

        // Event listeners
        document.getElementById('calculateBtn').addEventListener('click', calculate);
        document.getElementById('resetBtn').addEventListener('click', reset);
    </script>
</body>
</html>
